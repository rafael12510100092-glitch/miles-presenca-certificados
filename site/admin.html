<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel · MILES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Manrope:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="assets/styles.css?v=3">
  <style>
    .metricas { display:grid; grid-template-columns:repeat(4,1fr); gap:.7rem; margin-top:1rem; }
    @media (max-width:560px){ .metricas{ grid-template-columns:repeat(2,1fr); } }
    .mcard { background:var(--bg-3); border:1px solid var(--line-soft); border-radius:var(--radius-sm); padding:.8rem .9rem; }
    .mcard .n { font-family:var(--serif); font-size:1.5rem; color:var(--gold-lt); line-height:1; }
    .mcard .t { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-faint); font-weight:700; margin-top:.2rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar" id="topbar"></header>
    <div class="dochead"><span><b>Instituto MILES</b></span><span class="mid">Diretoria de Inovação</span><span>Proc. Seletivo · 2026</span></div>
    <div class="doc-rule"></div>

    <section class="section">
      <div class="row between reveal" style="align-items:flex-end">
        <div class="stack">
          <span class="eyebrow">Acompanhamento · somente leitura</span>
          <h1 style="font-size:clamp(1.8rem,4vw,2.5rem)">Painel de presenças</h1>
        </div>
        <div class="row">
          <label class="row" style="gap:.45rem;font-size:.86rem;font-weight:600;cursor:pointer">
            <input type="checkbox" id="show-cpf" style="width:18px;height:18px;accent-color:var(--gold)"> mostrar CPF
          </label>
          <button class="btn btn--gold" id="enviar" type="button">✉ Enviar aos elegíveis</button>
          <button class="btn btn--ghost" id="export" type="button">↓ Exportar CSV</button>
          <button class="btn btn--ghost" id="refresh" type="button">↻ Atualizar</button>
        </div>
      </div>

      <div class="card reveal d1" style="margin:1.2rem 0">
        <div class="stat" id="stat" role="status" aria-live="polite"><span class="muted">Carregando…</span></div>
        <div class="metricas" id="metricas"></div>
      </div>

      <div class="field" style="max-width:340px">
        <label for="busca" class="sr-only">Filtrar</label>
        <input class="input" id="busca" type="text" placeholder="Filtrar por nome ou CPF…">
      </div>

      <div id="wrap-tabela"></div>
    </section>

    <footer class="foot">O CPF aparece <b>mascarado por padrão</b> (mascarado no próprio servidor). Para ver completo,
      defina <code>ADMIN_KEY</code> nas Propriedades do Apps Script e marque "mostrar CPF".</footer>
  </div>

  <script src="config.js"></script>
  <script src="assets/app.js?v=3"></script>
  <script>
  (function () {
    var $ = MILES.$;
    MILES.mountTopbar('admin.html');
    var dados = null, adminKey = '';

    function linha(a) {
      var dots = '';
      for (var i = 1; i <= (dados.total || 4); i++)
        dots += '<span class="dot ' + (a.presentes.indexOf(i) !== -1 ? 'on' : 'miss') + '">' + i + '</span>';
      var badge = a.elegivel ? '<span class="badge badge--ok">elegível</span>'
        : '<span class="badge badge--bad">faltam ' + ((dados.minimo || 3) - a.qtd) + '</span>';
      return '<tr>' +
        '<td><b>' + MILES.escapeHTML(a.nome) + '</b></td>' +
        '<td class="mono">' + MILES.escapeHTML(a.cpf) + '</td>' +
        '<td><span class="dots">' + dots + '</span></td>' +
        '<td class="mono">' + a.qtd + '/' + dados.total + '</td>' +
        '<td>' + badge + '</td>' +
      '</tr>';
    }

    function render() {
      if (!dados) return;
      var r = dados.resumo;
      $('#stat').innerHTML =
        '<div><div class="b">' + r.alunos + '</div><div class="l">Alunos</div></div>' +
        '<div><div class="b" style="color:var(--ok)">' + r.elegiveis + '</div><div class="l">Elegíveis</div></div>' +
        '<div><div class="b" style="color:var(--bad)">' + r.naoElegiveis + '</div><div class="l">Pendentes</div></div>' +
        '<div><div class="b">' + r.taxaConclusao + '%</div><div class="l">Conclusão</div></div>';

      var por = r.porAula || {}, mc = '';
      for (var i = 1; i <= dados.total; i++)
        mc += '<div class="mcard"><div class="n">' + (por[i] || 0) + '</div><div class="t">Presenças · Aula ' + i + '</div></div>';
      $('#metricas').innerHTML = mc;

      var termo = ($('#busca').value || '').toLowerCase();
      var lista = dados.alunos.filter(function (a) {
        return !termo || a.nome.toLowerCase().indexOf(termo) !== -1 || MILES.onlyDigits(a.cpf).indexOf(MILES.onlyDigits(termo)) !== -1;
      });
      if (!lista.length) {
        $('#wrap-tabela').innerHTML = '<div class="card"><p class="muted">Nenhum aluno' +
          (termo ? ' para "' + MILES.escapeHTML(termo) + '"' : ' registrado ainda') + '.</p></div>';
        return;
      }
      $('#wrap-tabela').innerHTML = '<div class="table-wrap"><table class="data">' +
        '<thead><tr><th>Aluno</th><th>CPF</th><th>Aulas</th><th>Total</th><th>Status</th></tr></thead>' +
        '<tbody>' + lista.map(linha).join('') + '</tbody></table></div>';
    }

    async function carregar() {
      $('#stat').innerHTML = '<span class="muted">Carregando…</span>';
      try {
        var r = await MILES.api('listarPresencas', adminKey ? { adminKey: adminKey } : {});
        if (!r.ok) throw new Error(r.erro || 'resposta inválida');
        dados = r; render();
        if (adminKey && !r.admin) { // chave não confere
          $('#show-cpf').checked = false; adminKey = '';
          alert('Chave de admin incorreta ou ADMIN_KEY não definida no Apps Script. O CPF continua mascarado.');
        }
      } catch (e) {
        $('#stat').innerHTML = '<span class="badge badge--bad">erro</span>';
        $('#wrap-tabela').innerHTML = '<div class="card"><div class="notice notice--bad"><span class="ic" aria-hidden="true">⚠</span><span>' +
          MILES.escapeHTML(e.message) + ' — configure o <code>config.js</code> e publique o Apps Script.</span></div></div>';
      }
    }

    function exportarCSV() {
      if (!dados || !dados.alunos.length) return;
      var head = ['Nome', 'CPF', 'Aulas presentes', 'Total', 'Elegivel'];
      var linhas = dados.alunos.map(function (a) {
        return [a.nome, a.cpf, a.presentes.join(' '), a.qtd + '/' + dados.total, a.elegivel ? 'Sim' : 'Nao'];
      });
      var csv = [head].concat(linhas).map(function (row) {
        return row.map(function (c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
      }).join('\r\n');
      var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'presencas-miles.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    async function enviarElegiveis() {
      if (!dados || !dados.resumo.elegiveis) { alert('Não há alunos elegíveis para enviar.'); return; }
      var key = adminKey;
      if (!key && !MILES.useDemo()) { key = prompt('Chave de admin (ADMIN_KEY) para enviar os certificados por e-mail:'); if (!key) return; }
      if (!confirm('Enviar o certificado por e-mail a ' + dados.resumo.elegiveis + ' aluno(s) elegível(is)?')) return;
      var b = $('#enviar'); b.disabled = true; var t = b.innerHTML; b.innerHTML = '<span class="spin" aria-hidden="true"></span> Enviando…';
      try {
        var r = await MILES.api('enviarCertificadosElegiveis', { adminKey: key, siteUrl: location.origin });
        if (r.ok) { if (key) adminKey = key;
          alert('✓ ' + r.enviados + ' certificado(s) enviado(s)' + (r.semEmail ? ' · ' + r.semEmail + ' sem e-mail' : '') +
            (r.demo ? '\n(demonstração — nenhum e-mail real foi enviado)' : '') + '.'); }
        else alert('⚠ ' + (r.erro || 'Falha ao enviar.'));
      } catch (e) { alert('⚠ ' + e.message); }
      finally { b.disabled = false; b.innerHTML = t; }
    }

    $('#enviar').addEventListener('click', enviarElegiveis);
    $('#refresh').addEventListener('click', carregar);
    $('#export').addEventListener('click', exportarCSV);
    $('#busca').addEventListener('input', render);
    $('#show-cpf').addEventListener('change', function () {
      if (this.checked) {
        var k = prompt('Chave de admin (ADMIN_KEY do Apps Script) para exibir o CPF completo:');
        if (!k) { this.checked = false; return; }
        adminKey = k;
      } else { adminKey = ''; }
      carregar();
    });
    carregar();
  })();
  </script>
</body>
</html>
